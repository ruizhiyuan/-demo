<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>中国人口数据趋势查询</title>
    <script src="https://cdn.staticfile.org/echarts/5.4.3/echarts.min.js"></script>
    <style>
        body { background-color: #f0f2f5; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card-container { width: 950px; background: #fff; padding: 30px; border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.08); }
        
        /* Tab 样式 */
        .tabs { display: flex; gap: 10px; margin-bottom: 25px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        .tab-btn { 
            padding: 10px 24px; border: none; background: #f3f4f6; border-radius: 8px; 
            cursor: pointer; font-weight: 600; color: #6b7280; transition: all 0.3s; 
        }
        /* 三种激活状态的颜色 */
        .tab-btn.active.green { background: #10b981; color: white; box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3); }
        .tab-btn.active.blue { background: #3b82f6; color: white; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3); }
        .tab-btn.active.orange { background: #f59e0b; color: white; box-shadow: 0 4px 12px rgba(245, 158, 11, 0.3); }

        .header { margin-bottom: 20px; }
        .title { color: #1f2937; font-size: 22px; font-weight: bold; }
        
        #chart { width: 100%; height: 480px; }
        
        .footer { margin-top: 20px; padding-top: 15px; border-top: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: center; }
        .source-info { font-size: 13px; color: #6b7280; }
        .update-time { font-size: 12px; color: #9ca3af; }
    </style>
</head>
<body>

<div class="card-container">
    <div class="header">
        <div class="title">中国历年人口数据查询</div>
    </div>

    <div class="tabs">
        <button class="tab-btn active green" onclick="switchTab('rate', this)">出生率 (‰)</button>
        <button class="tab-btn" onclick="switchTab('count', this)">出生人数 (万人)</button>
        <button class="tab-btn" onclick="switchTab('growth', this)">自然增长率 (‰)</button>
    </div>

    <div id="chart"></div>

    <div class="footer">
        <div class="source-info">数据来源：中经数据库</div>
        <div class="update-time">最后更新：2024年11月</div>
    </div>
</div>

<script>
    var myChart = echarts.init(document.getElementById('chart'));
    
    // 50年历史数据 (1974 - 2023)
    const years = ['1974', '1975', '1976', '1977', '1978', '1979', '1980', '1981', '1982', '1983', '1984', '1985', '1986', '1987', '1988', '1989', '1990', '1991', '1992', '1993', '1994', '1995', '1996', '1997', '1998', '1999', '2000', '2001', '2002', '2003', '2004', '2005', '2006', '2007', '2008', '2009', '2010', '2011', '2012', '2013', '2014', '2015', '2016', '2017', '2018', '2019', '2020', '2021', '2022', '2023'];
    
    // 出生率 (‰)
    const rateData = [24.82, 23.01, 19.91, 18.93, 18.25, 17.82, 18.21, 20.91, 22.28, 20.19, 19.90, 21.04, 22.43, 23.33, 22.37, 21.58, 21.06, 19.68, 18.24, 18.09, 17.70, 17.12, 16.98, 16.57, 15.64, 14.64, 14.03, 13.38, 12.86, 12.41, 12.29, 12.40, 12.09, 12.10, 12.14, 11.95, 11.90, 11.93, 12.10, 12.08, 12.37, 12.07, 12.95, 12.43, 10.94, 10.41, 8.52, 7.52, 6.77, 6.39];
    
    // 出生人数 (万人)
    const countData = [2234, 2102, 1849, 1783, 1745, 1727, 1776, 2068, 2238, 2052, 2027, 2196, 2384, 2522, 2457, 2408, 2391, 2258, 2119, 2126, 2104, 2063, 2067, 2038, 1942, 1834, 1771, 1702, 1647, 1599, 1593, 1617, 1584, 1594, 1608, 1615, 1592, 1604, 1635, 1640, 1687, 1655, 1786, 1723, 1523, 1465, 1200, 1062, 956, 902];

    // 自然增长率 (‰)
    const growthData = [17.48, 15.77, 12.66, 12.03, 12.00, 11.61, 11.87, 14.55, 16.01, 13.29, 13.21, 14.26, 15.57, 16.61, 15.73, 15.04, 14.39, 12.98, 11.60, 11.45, 11.21, 10.55, 10.42, 10.06, 9.14, 8.18, 7.58, 6.95, 6.45, 6.01, 5.87, 5.89, 5.28, 5.17, 5.08, 4.87, 4.79, 4.79, 4.95, 4.92, 5.21, 4.93, 6.53, 5.58, 3.78, 3.32, 1.45, 0.34, -0.60, -1.48];

    function getOption(type) {
        let themeColor, shadowColor, data, label, unit;
        
        if (type === 'rate') {
            themeColor = '#10b981'; // 绿
            shadowColor = 'rgba(16, 185, 129, 0.15)';
            data = rateData;
            label = '出生率';
            unit = '‰';
        } else if (type === 'count') {
            themeColor = '#3b82f6'; // 蓝
            shadowColor = 'rgba(59, 130, 246, 0.15)';
            data = countData;
            label = '出生人数';
            unit = '万人';
        } else {
            themeColor = '#f59e0b'; // 琥珀橙
            shadowColor = 'rgba(245, 158, 11, 0.15)';
            data = growthData;
            label = '自然增长率';
            unit = '‰';
        }
        
        return {
            grid: { top: '10%', bottom: '15%', left: '5%', right: '3%', containLabel: true },
            tooltip: {
                trigger: 'axis',
                backgroundColor: '#fff',
                borderRadius: 8,
                padding: 12,
                boxShadow: '0 4px 12px rgba(0,0,0,0.1)',
                formatter: function(params) {
                    let val = params[0].value;
                    return `<div style="color:#999;margin-bottom:4px">${params[0].name}年</div>
                            <div style="font-weight:bold;font-size:16px;color:#333">
                                <span style="color:${themeColor}">●</span> ${label}: ${val}${unit}
                            </div>`;
                }
            },
            dataZoom: [
                { 
                    type: 'inside', 
                    start: 50, end: 100, 
                    minSpan: 20  // 限制最小缩放范围，防止曲线变丑
                },
                { 
                    type: 'slider', 
                    height: 20, bottom: 10,
                    borderColor: 'transparent',
                    backgroundColor: '#f4f4f5',
                    fillerColor: shadowColor,
                    handleSize: '100%',
                    handleStyle: { color: '#fff', shadowBlur: 3, shadowColor: 'rgba(0,0,0,0.1)' },
                    labelFormatter: '', 
                    minSpan: 20 
                }
            ],
            xAxis: {
                type: 'category',
                data: years,
                axisLine: { lineStyle: { color: '#e5e7eb' } },
                axisLabel: { color: '#6b7280', fontSize: 12, interval: 4 },
                axisTick: { show: false }
            },
            yAxis: {
                type: 'value',
                scale: true,
                splitLine: { lineStyle: { color: '#f3f4f6', type: 'dashed' } },
                axisLabel: { color: '#9ca3af' }
            },
            series: [{
                name: label,
                type: 'line',
                data: data,
                smooth: 0.4,
                symbol: 'circle',
                symbolSize: 6,
                showSymbol: false,
                lineStyle: { width: 4, color: themeColor },
                itemStyle: { color: themeColor, borderColor: '#fff', borderWidth: 2 },
                areaStyle: {
                    color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                        { offset: 0, color: shadowColor },
                        { offset: 1, color: 'transparent' }
                    ])
                },
                emphasis: { focus: 'series', itemStyle: { symbolSize: 10, borderWidth: 3 } }
            }]
        };
    }

    // 初始化渲染
    myChart.setOption(getOption('rate'));

    // 切换逻辑
    function switchTab(type, btn) {
        // 清除所有按钮状态
        document.querySelectorAll('.tab-btn').forEach(b => {
            b.classList.remove('active', 'green', 'blue', 'orange');
        });
        
        // 添加对应的颜色类
        btn.classList.add('active');
        if(type === 'rate') btn.classList.add('green');
        if(type === 'count') btn.classList.add('blue');
        if(type === 'growth') btn.classList.add('orange');

        myChart.setOption(getOption(type), true);
    }

    window.addEventListener('resize', () => myChart.resize());
</script>
</body>
</html>
